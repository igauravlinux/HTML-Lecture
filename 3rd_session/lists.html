<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>

    <!-- Unordered List -->

    <ul type="circle">
        <li>Apple</li>
        <li>Litchi</li>
        <li>Mango</li>
        <li>Orange</li>
    </ul>

    <!-- Ordered List -->

    <ol type="A" start="3">
        <li>Apple</li>
        <li>Litchi</li>
        <li>Mango</li>
        <li>Orange</li>
    </ol>

    <!-- Definition List -->

    <dl>
        <dt><b>HTML</b></dt>
        <dd>Hyper Text Markup Language</dd>

        <dt><b>CSS</b></dt>
        <dd>Cascading Style Sheet</dd>

        <dt><b>JS</b></dt>
        <dd>JavaScript</dd>
    </dl>



    
</body>
</html>
