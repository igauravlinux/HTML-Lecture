    <title>Card</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<body>

    <div class="card">

        <span><i class='bx bx-error'></i></span>

        <h3 class="heading">Deactivate account</h3>

        <p class="para">Are you sure you want to deactivate your account? All of your data will be permanently removed. This action cannot be undone.</p>

        <div class="btns">
            <button type="button" class="btn btn1">Deactivation</button>
            <button type="button" class="btn btn2">Cancel</button>
        </div>
        

    </div>
    
</body>
